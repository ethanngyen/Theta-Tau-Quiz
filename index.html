<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Theta Tau Study Guide</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  
  <body>
    <div class="wrap">
      <div id="gate">
        <h1>Theta Tau Study Guide</h1>
        <p class="hint">Enter the password to access the study set.</p>
        <div class="row">
          <input id="pw" type="password" placeholder="Password" />
          <button id="unlock">Unlock</button>
        </div>
        <p id="msg" class="hint"></p>
      </div>

      <div id="app" class="hidden">
        <div class="topbar">
          <h2 style="margin: 0">Type-to-Answer Cards</h2>
          <div class="pill" id="countPill"></div>
        </div>

        <div class="row" style="margin-bottom: 14px">
          <input
            id="search"
            placeholder="Search…"
            style="flex: 1; min-width: 240px"
          />
          <button id="reload" class="smallBtn">Reload quiz</button>
        </div>

        <div id="list"></div>
        <p class="hint">
          Tip: Press Enter to check your answer. Use “Reset marks” to clear
          colors.
        </p>
      </div>
    </div>
    <script src="./app.js" defer></script>
  </body>
</html>
